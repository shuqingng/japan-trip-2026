<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Trips</title>
<link rel="icon" href="https://em-content.zobj.net/source/twitter/376/world-map_1f5fa-fe0f.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1b2e;
    --paper: #f4f3f7;
    --paper2: #e9e8f0;
    --muted: #6e6b80;
    --border: rgba(26,27,46,0.11);
    --shadow: 0 2px 20px rgba(26,27,46,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

  /* HEADER */
  .site-header {
    background: var(--ink);
    padding: 72px 24px 64px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .site-header-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 70% at 10% 40%, rgba(14,165,233,0.18) 0%, transparent 65%),
      radial-gradient(ellipse 55% 60% at 88% 25%, rgba(99,102,241,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 50% 55% at 50% 95%, rgba(20,184,166,0.12) 0%, transparent 60%);
  }
  /* Subtle grid texture */
  .site-header-grid {
    position: absolute; inset: 0; opacity: 0.04;
    background-image: linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .site-header-inner { position: relative; z-index: 1; }
  .site-eyebrow {
    font-size: 11px; font-weight: 500; letter-spacing: 0.35em; text-transform: uppercase;
    color: rgba(255,255,255,0.35); margin-bottom: 20px;
  }
  .site-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(42px, 9vw, 88px);
    font-weight: 800; color: #fff; line-height: 1;
    letter-spacing: -0.01em;
  }
  .site-sub {
    margin-top: 16px; font-size: 14px; color: rgba(255,255,255,0.38); letter-spacing: 0.04em;
  }

  /* MAIN */
  .main { max-width: 1100px; margin: 0 auto; padding: 48px 24px 80px; }

  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px;
  }
  .section-label {
    font-size: 11px; font-weight: 500; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--muted);
  }

  /* TRIPS GRID */
  .trips-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 24px;
  }

  /* TRIP CARD */
  .trip-card {
    background: var(--ink);
    border-radius: 18px;
    overflow: hidden;
    cursor: pointer;
    text-decoration: none;
    display: block;
    position: relative;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    box-shadow: 0 4px 24px rgba(26,26,24,0.15);
    aspect-ratio: 3 / 2;
  }
  .trip-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(26,26,24,0.22); }

  .trip-card-bg {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
  }
  /* Gradient overlay — always dark at bottom for readability */
  .trip-card-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(26,26,24,0.25) 0%, rgba(26,26,24,0.75) 100%);
  }

  /* Horizon SVG placeholder shown when no cover image */
  .trip-card-horizon {
    position: absolute; bottom: 0; left: 0; right: 0;
    width: 100%; opacity: 0.14;
  }

  .trip-card-body {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 24px;
  }
  .trip-card-status {
    position: absolute; top: 18px; left: 18px;
    font-size: 10px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase;
    background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.85);
    padding: 4px 10px; border-radius: 20px; backdrop-filter: blur(4px);
  }
  .trip-card-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 4.5vw, 44px);
    font-weight: 700; color: #fff; line-height: 1.05; letter-spacing: -0.01em;
    margin-bottom: 6px;
  }
  .trip-card-subtitle {
    font-size: 13px; color: rgba(255,255,255,0.6); letter-spacing: 0.03em;
    margin-bottom: 16px;
  }
  .trip-card-meta {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  }
  .trip-card-chip {
    font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.75);
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px; padding: 4px 10px; backdrop-filter: blur(4px);
  }

  /* ADD TRIP CARD */
  .trip-card-add {
    background: transparent;
    border: 2px dashed var(--border);
    border-radius: 18px;
    aspect-ratio: 3 / 2;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; color: var(--muted); cursor: default;
    transition: all 0.2s;
  }
  .trip-card-add-icon { font-size: 28px; opacity: 0.4; }
  .trip-card-add-label { font-size: 13px; font-weight: 500; }
  .trip-card-add-hint { font-size: 11px; color: var(--muted); opacity: 0.6; text-align: center; max-width: 180px; line-height: 1.5; }

  /* LOADING */
  #loading { text-align: center; padding: 60px 0; color: var(--muted); font-size: 13px; letter-spacing: 0.1em; }

  /* FOOTER */
  /* footer { background: var(--ink); color: rgba(255,255,255,0.25); text-align: center; padding: 28px 24px; font-size: 12px; letter-spacing: 0.05em; } */
</style>
</head>
<body>

<header class="site-header">
  <div class="site-header-bg"></div>
  <div class="site-header-grid"></div>
  <div class="site-header-inner">
    <div class="site-eyebrow">Travel Journal</div>
    <div class="site-title">My Trips</div>
    <div class="site-sub">Every adventure, in one place</div>
  </div>
</header>

<main class="main">
  <div class="section-header">
    <div class="section-label" id="trips-count">Loading…</div>
  </div>

  <div id="loading">Loading trips…</div>
  <div class="trips-grid" id="trips-grid" style="display:none"></div>
</main>

<!-- <footer>Made with love 🌸</footer> -->

<script>
async function loadTrips() {
  let trips = [];
  try {
    const res = await fetch("trips.json?t=" + Date.now());
    if (res.ok) trips = await res.json();
  } catch(e) { /* ignore */ }
  render(trips);
}

function statusLabel(status) {
  const map = { upcoming: "Upcoming", past: "Past", planning: "Planning" };
  return map[status] || status || "";
}

function buildPaletteGradient(palette) {
  if (!palette || !palette.length) return "linear-gradient(135deg, #1a1a18 0%, #2d2d2a 100%)";
  const c = palette;
  return `radial-gradient(ellipse 80% 70% at 20% 80%, ${c[0]}55 0%, transparent 60%),
          radial-gradient(ellipse 60% 60% at 80% 20%, ${c[1] || c[0]}44 0%, transparent 60%),
          radial-gradient(ellipse 50% 50% at 50% 50%, ${c[2] || c[0]}33 0%, transparent 70%),
          linear-gradient(135deg, #1a1a18 0%, #2a2a26 100%)`;
}

function render(trips) {
  document.getElementById("loading").style.display = "none";
  const grid = document.getElementById("trips-grid");
  grid.style.display = "grid";
  document.getElementById("trips-count").textContent =
    trips.length === 1 ? "1 trip" : `${trips.length} trips`;

  trips.forEach(t => {
    const a = document.createElement("a");
    a.className = "trip-card";
    a.href = t.path;

    const bg = document.createElement("div");
    bg.className = "trip-card-bg";
    if (t.coverImage) {
      bg.style.backgroundImage = `url('${t.coverImage}')`;
    } else {
      bg.style.background = buildPaletteGradient(t.palette);
      // Horizon SVG for trips without a cover photo
      const horizon = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      horizon.setAttribute("class", "trip-card-horizon");
      horizon.setAttribute("viewBox", "0 0 900 200");
      horizon.setAttribute("fill", "none");
      horizon.setAttribute("preserveAspectRatio", "none");
      horizon.innerHTML = `
        <path d="M0 200 L0 130 Q80 80 180 110 Q280 140 380 70 Q480 0 580 50 Q680 100 780 60 Q860 30 900 50 L900 200Z" fill="white"/>
        <path d="M0 200 L0 160 Q120 130 240 150 Q360 170 480 130 Q600 90 720 120 Q820 145 900 125 L900 200Z" fill="white" opacity="0.5"/>`;
      bg.appendChild(horizon);
    }

    const overlay = document.createElement("div");
    overlay.className = "trip-card-overlay";

    const body = document.createElement("div");
    body.className = "trip-card-body";

    const chips = [
      t.dateRange && `<span class="trip-card-chip">${t.dateRange}</span>`,
      t.people    && `<span class="trip-card-chip">${t.people} people</span>`,
      t.tripType  && `<span class="trip-card-chip">${t.tripType}</span>`,
    ].filter(Boolean).join("");

    body.innerHTML = `
      ${t.status ? `<div class="trip-card-status">${statusLabel(t.status)}</div>` : ""}
      <div class="trip-card-title">${t.title}</div>
      ${t.subtitle ? `<div class="trip-card-subtitle">${t.subtitle}</div>` : ""}
      ${chips ? `<div class="trip-card-meta">${chips}</div>` : ""}
    `;

    a.appendChild(bg);
    a.appendChild(overlay);
    a.appendChild(body);
    grid.appendChild(a);
  });

  // // "Add trip" placeholder
  // const add = document.createElement("div");
  // add.className = "trip-card-add";
  // add.innerHTML = `
  //   <div class="trip-card-add-icon">＋</div>
  //   <div class="trip-card-add-label">Add a trip</div>
  //   <div class="trip-card-add-hint">Create a new folder under trips/ and add it to trips.json</div>
  // `;
  // grid.appendChild(add);
}

loadTrips();
</script>
</body>
</html>
